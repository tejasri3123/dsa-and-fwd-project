<!DOCTYPE html>
<html>
<head>
<title>Digital Inventory Tracking for Small Shops</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

.container{
    width:80%;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    color:#333;
}

input{
    padding:8px;
    margin:5px;
}

button{
    padding:8px 15px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
}

th{
    background:#444;
    color:white;
}

.deleteBtn{
    background:red;
}
</style>
</head>

<body>

<div class="container">

<h1>Digital Inventory Tracking for Small Shops</h1>

<h3>Add Product</h3>

<input type="text" id="pid" placeholder="Product ID">
<input type="text" id="pname" placeholder="Product Name">
<input type="number" id="qty" placeholder="Quantity">
<input type="number" id="price" placeholder="Price">

<br><br>

<button onclick="addProduct()">Add Product</button>

<table id="inventoryTable">
<tr>
<th>Product ID</th>
<th>Product Name</th>
<th>Quantity</th>
<th>Price</th>
<th>Action</th>
</tr>
</table>

</div>

<script>

function addProduct(){

let id=document.getElementById("pid").value;
let name=document.getElementById("pname").value;
let qty=document.getElementById("qty").value;
let price=document.getElementById("price").value;

if(id=="" || name=="" || qty=="" || price==""){
alert("Please fill all fields");
return;
}

let table=document.getElementById("inventoryTable");
let row=table.insertRow();

row.insertCell(0).innerHTML=id;
row.insertCell(1).innerHTML=name;
row.insertCell(2).innerHTML=qty;
row.insertCell(3).innerHTML=price;

let action=row.insertCell(4);
action.innerHTML="<button class='deleteBtn' onclick='deleteRow(this)'>Delete</button>";

document.getElementById("pid").value="";
document.getElementById("pname").value="";
document.getElementById("qty").value="";
document.getElementById("price").value="";
}

function deleteRow(btn){
let row=btn.parentNode.parentNode;
row.parentNode.removeChild(row);
}

</script>

</body>
</html>
